<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Fueltech BI — LATAM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="dashboard_chart.js"></script>
<style>
  :root {
    --orange:#DC2626; --orange-2:#EF4444; --green:#00C853;
    --bg:#0d0d0d; --bg-alt:#111;
    --card:#1a1a1a; --card-hover:#1f1f1f;
    --card-grad:linear-gradient(135deg,#1a1a1a 0%,#1e1e1e 100%);
    --border:#2a2a2a; --border-strong:#3a3a3a;
    --text:#fff; --text-soft:#e8e8e8; --muted:#9a9a9a;
    --radius:8px; --radius-sm:6px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); font-size:13px}
  header{background:#000; padding:14px 24px; border-bottom:3px solid var(--orange);
    display:flex; align-items:center; gap:16px}
  header h1{margin:0; font-size:18px; font-weight:700; letter-spacing:.5px; color:#fff}
  header h1 .accent{background:linear-gradient(135deg,var(--orange) 0%,var(--orange-2) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent}
  header .sub{color:#aaa; font-size:12px; margin-left:auto}
  header a.back{color:#aaa; text-decoration:none; padding:7px 14px;
    border:1px solid rgba(255,255,255,.2); border-radius:18px; font-size:12px;
    transition:all .15s}
  header a.back:hover{color:var(--orange); border-color:var(--orange)}

  .container{padding:18px 24px; max-width:1600px; margin:0 auto}

  /* KPIs */
  .kpi-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px; margin-bottom:16px}
  .kpi-card{background:var(--card-grad); border:1px solid var(--border);
    border-left:3px solid var(--orange); border-radius:var(--radius); padding:14px}
  .kpi-card .kpi-label{font-size:10px; color:var(--muted);
    text-transform:uppercase; letter-spacing:.5px; font-weight:700}
  .kpi-card .kpi-value{font-size:22px; font-weight:800; color:var(--text);
    margin-top:6px; letter-spacing:-.5px}
  .kpi-card .kpi-sub{font-size:11px; color:var(--muted); margin-top:3px}

  /* Layout */
  .grid-main{display:grid; grid-template-columns:1.3fr 1fr; gap:14px}
  @media(max-width:1100px){.grid-main{grid-template-columns:1fr}}

  .panel{background:var(--card-grad); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px;
    border-top:3px solid var(--orange); margin-bottom:14px}
  .panel h2{margin:0 0 10px; font-size:14px; font-weight:700;
    display:flex; align-items:center; justify-content:space-between; gap:10px}
  .panel h2 .info{font-size:11px; color:var(--muted); font-weight:400}

  /* Mapa LATAM */
  .latam-map{width:100%; height:auto; display:block;
    background:linear-gradient(180deg,#0a1a2e 0%,#0d0d0d 100%);
    border-radius:6px}
  .latam-map .pais{stroke:rgba(255,255,255,.2); stroke-width:.7;
    cursor:pointer; transition:filter .15s, stroke-width .15s}
  .latam-map .pais:hover{stroke:#fff; stroke-width:1.5; filter:brightness(1.2)}
  .latam-map .pais.selected{stroke:var(--orange); stroke-width:2;
    filter:drop-shadow(0 0 6px rgba(220,38,38,.6))}
  .latam-map .pais.empty{fill:#1a1a1a !important; opacity:.5}
  .latam-map .pais-label{fill:#fff; font-size:8px; font-weight:700;
    text-anchor:middle; pointer-events:none;
    text-shadow:0 1px 2px rgba(0,0,0,.9)}

  .legend{display:flex; align-items:center; gap:10px; margin-top:10px;
    font-size:11px; color:var(--muted)}
  .legend-bar{flex:1; height:8px; border-radius:4px;
    background:linear-gradient(to right,#1a1a1a 0%,#3c0c0c 10%,#7f1d1d 25%,
      #b91c1c 45%,#dc2626 65%,#ef4444 85%,#fb923c 100%)}

  /* Tabela */
  table{width:100%; border-collapse:collapse; font-size:12px}
  th{padding:8px 10px; text-align:left; font-weight:700; color:var(--text);
    border-bottom:1px solid var(--border-strong); font-size:10px;
    text-transform:uppercase; letter-spacing:.5px;
    cursor:pointer; user-select:none; background:var(--bg-alt)}
  th:hover{color:var(--orange)}
  th.num{text-align:right}
  td{padding:7px 10px; border-bottom:1px solid var(--border); color:var(--text-soft)}
  td.num{text-align:right; font-variant-numeric:tabular-nums}
  tbody tr{cursor:pointer; transition:background .1s}
  tbody tr:hover{background:rgba(220,38,38,.08)}
  .country-bar{display:inline-block; height:6px; background:var(--orange);
    border-radius:3px; vertical-align:middle; margin-right:6px}

  .chart-wrap{height:280px}

  /* Loading */
  #loading{position:fixed; inset:0; display:flex; align-items:center;
    justify-content:center; background:#0a0a0a; z-index:1000;
    flex-direction:column; gap:10px}
  #loading .ft{color:var(--orange); font-size:24px; font-weight:800; letter-spacing:2px}
  #loading .sub{color:#aaa; font-size:12px}

  /* Filtros simples */
  .filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;
    align-items:center}
  .filters label{font-size:11px; color:var(--muted); font-weight:700;
    text-transform:uppercase; letter-spacing:.4px}
  .filters select, .filters input{padding:7px 10px; background:#0a0a0a;
    border:1px solid var(--input-border,#2a2a2a); color:#fff;
    border-radius:var(--radius-sm); font-size:12px; font-family:inherit}
  .filters select:focus, .filters input:focus{outline:none; border-color:var(--orange)}
</style>
</head>
<body>

<div id="loading">
  <div class="ft">FUELTECH BI — LATAM</div>
  <div class="sub">Carregando dados...</div>
</div>

<header>
  <h1><span class="accent">FUELTECH</span> BI — Exportações LATAM</h1>
  <span class="sub">América Latina · 2023–2026</span>
  <a href="dashboard_fueltech.html" class="back">← Voltar ao Brasil</a>
</header>

<div class="container" id="app" style="display:none">

  <div class="filters">
    <div>
      <label>Ano</label>
      <select id="f_ano"><option value="">Todos</option></select>
    </div>
    <div>
      <label>País</label>
      <select id="f_pais"><option value="">Todos</option></select>
    </div>
    <div style="margin-left:auto">
      <button id="btn_reset" style="padding:7px 16px; background:var(--orange);
        color:#000; border:none; border-radius:18px; font-weight:700;
        cursor:pointer; font-size:11px; letter-spacing:.5px">LIMPAR</button>
    </div>
  </div>

  <div class="kpi-row" id="kpis"></div>

  <div class="grid-main">
    <!-- ESQUERDA: Mapa LATAM -->
    <div class="panel">
      <h2>
        <span>Mapa — América Latina</span>
        <span class="info" id="map_info"></span>
      </h2>
      <svg class="latam-map" id="latam_map" viewBox="0 0 400 600"
           preserveAspectRatio="xMidYMid meet"
           xmlns="http://www.w3.org/2000/svg">
        <g id="latam_paths"></g>
        <g id="latam_labels"></g>
      </svg>
      <div class="legend">
        <span>R$ 0</span>
        <div class="legend-bar"></div>
        <span id="legend_max">—</span>
      </div>
    </div>

    <!-- DIREITA: Top Países -->
    <div class="panel">
      <h2>
        <span>Top Países LATAM</span>
        <span class="info" id="paises_info"></span>
      </h2>
      <table id="tb_paises">
        <thead>
          <tr>
            <th data-k="pais">País</th>
            <th data-k="cnt" class="num">Pedidos</th>
            <th data-k="val" class="num">Faturamento</th>
            <th data-k="pct" class="num">%</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="grid-main">
    <div class="panel">
      <h2><span>Faturamento por Mês</span></h2>
      <div class="chart-wrap"><canvas id="chart_timeline"></canvas></div>
    </div>
    <div class="panel">
      <h2><span>Top 10 Produtos LATAM</span></h2>
      <div class="chart-wrap"><canvas id="chart_produtos"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <h2>
      <span>Top 20 Clientes LATAM</span>
      <span class="info" id="clientes_info"></span>
    </h2>
    <table id="tb_clientes">
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>País</th>
          <th class="num">Pedidos</th>
          <th class="num">Faturamento</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="dashboard_geo_world.js"></script>
<script src="dashboard_data.js"></script>
<script>
'use strict';
const DATA = window.__DATA__;
const WGEO = window.__GEO_WORLD__ || { countries:{}, states:{} };
const C = Object.fromEntries(DATA.schema.map((s,i)=>[s,i]));

// === LATAM countries ===
// Dataset uses these names
const LATAM_DATASET = new Set([
  'ARGENTINA','BOLIVIA','CHILE','COLOMBIA','EQUADOR',
  'GUIANA','PARAGUAI','PERU','URUGUAI','VENEZUELA',
  'MEXICO','PANAMA'
]);
// Mapping dataset → Natural Earth name
const PAIS_DS_TO_NE = {
  'ARGENTINA':'Argentina','BOLIVIA':'Bolivia','CHILE':'Chile',
  'COLOMBIA':'Colombia','EQUADOR':'Ecuador','GUIANA':'Guyana',
  'PARAGUAI':'Paraguay','PERU':'Peru','URUGUAI':'Uruguay',
  'VENEZUELA':'Venezuela','MEXICO':'Mexico','PANAMA':'Panama'
};
const PAIS_NE_TO_DS = {};
for (const k in PAIS_DS_TO_NE) PAIS_NE_TO_DS[PAIS_DS_TO_NE[k]] = k;

// State
const state = {
  ano: '',
  pais: '',
  selectedPais: null
};

// === Helpers ===
const fmtMoney = v => 'R$ ' + (v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtMoneyShort = v => {
  v = v||0;
  if (Math.abs(v) >= 1e9) return 'R$ ' + (v/1e9).toFixed(2).replace('.',',') + 'B';
  if (Math.abs(v) >= 1e6) return 'R$ ' + (v/1e6).toFixed(2).replace('.',',') + 'M';
  if (Math.abs(v) >= 1e3) return 'R$ ' + (v/1e3).toFixed(1).replace('.',',') + 'K';
  return 'R$ ' + v.toFixed(0);
};
const fmtInt = v => (v||0).toLocaleString('pt-BR');

// === Heat color ===
function heatColor(t) {
  t = Math.sqrt(Math.max(0, Math.min(1, t)));
  const stops = [
    [0,    [26,26,26]],
    [0.10, [60,12,12]],
    [0.25, [127,29,29]],
    [0.45, [185,28,28]],
    [0.65, [220,38,38]],
    [0.85, [239,68,68]],
    [1.00, [251,146,60]]
  ];
  for (let i = 1; i < stops.length; i++) {
    if (t <= stops[i][0]) {
      const a = stops[i-1], b = stops[i];
      const k = (t - a[0]) / (b[0] - a[0]);
      return [
        Math.round(a[1][0] + (b[1][0]-a[1][0])*k),
        Math.round(a[1][1] + (b[1][1]-a[1][1])*k),
        Math.round(a[1][2] + (b[1][2]-a[1][2])*k)
      ];
    }
  }
  return stops[stops.length-1][1];
}
function heatRGB(t) { const c = heatColor(t); return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }

// === Aggregation ===
function aggregate() {
  const out = { porPais: {}, porMes: {}, porProduto: {}, porCliente: {},
    totVal: 0, totCnt: 0, totQtd: 0, totClientes: new Set() };
  for (const r of DATA.orders) {
    if (DATA.ufs[r[C.uf]] !== 'EX') continue;
    if (r[C.tr] === 1) continue; // ignora devoluções
    const pais = DATA.paises[r[C.pa]] || '?';
    if (!LATAM_DATASET.has(pais)) continue;
    if (state.ano && r[C.ano] !== +state.ano) continue;
    if (state.pais && pais !== state.pais) continue;

    if (!out.porPais[pais]) out.porPais[pais] = { cnt:0, val:0, qtd:0, clientes:new Set() };
    out.porPais[pais].cnt++;
    out.porPais[pais].val += r[C.val];
    out.porPais[pais].qtd += r[C.qtd];
    out.porPais[pais].clientes.add(r[C.cl]);

    const ym = r[C.ano] * 100 + r[C.mes];
    if (!out.porMes[ym]) out.porMes[ym] = { val: 0, cnt: 0 };
    out.porMes[ym].val += r[C.val];
    out.porMes[ym].cnt++;

    for (const [pi, q, v] of r[C.pr]) {
      const pn = DATA.produtos[pi];
      if (!out.porProduto[pn]) out.porProduto[pn] = { val: 0, qtd: 0 };
      out.porProduto[pn].val += v;
      out.porProduto[pn].qtd += q;
    }

    const cli = r[C.cl];
    if (!out.porCliente[cli]) out.porCliente[cli] = { cnt: 0, val: 0, paises: new Set() };
    out.porCliente[cli].cnt++;
    out.porCliente[cli].val += r[C.val];
    out.porCliente[cli].paises.add(pais);

    out.totVal += r[C.val];
    out.totCnt++;
    out.totQtd += r[C.qtd];
    out.totClientes.add(cli);
  }
  return out;
}

// === Render KPIs ===
function renderKPIs(agg) {
  const tk = agg.totCnt > 0 ? (agg.totVal / agg.totCnt) : 0;
  const numPaises = Object.keys(agg.porPais).length;
  document.getElementById('kpis').innerHTML =
    `<div class="kpi-card"><div class="kpi-label">Faturamento Total</div>
       <div class="kpi-value">${fmtMoneyShort(agg.totVal)}</div>
       <div class="kpi-sub">${fmtMoney(agg.totVal)}</div></div>
     <div class="kpi-card"><div class="kpi-label">Pedidos</div>
       <div class="kpi-value">${fmtInt(agg.totCnt)}</div>
       <div class="kpi-sub">${numPaises} país(es)</div></div>
     <div class="kpi-card"><div class="kpi-label">Clientes Únicos</div>
       <div class="kpi-value">${fmtInt(agg.totClientes.size)}</div>
       <div class="kpi-sub">no recorte</div></div>
     <div class="kpi-card"><div class="kpi-label">Ticket Médio</div>
       <div class="kpi-value">${fmtMoneyShort(tk)}</div>
       <div class="kpi-sub">por pedido</div></div>
     <div class="kpi-card"><div class="kpi-label">Unidades</div>
       <div class="kpi-value">${fmtInt(Math.round(agg.totQtd))}</div>
       <div class="kpi-sub">itens vendidos</div></div>`;
}

// === Render Mapa LATAM ===
function buildMap() {
  const layer = document.getElementById('latam_paths');
  const labels = document.getElementById('latam_labels');
  if (!layer) return;
  layer.innerHTML = '';
  labels.innerHTML = '';

  // Coleta paths dos países LATAM e calcula bbox
  const paths = [];
  let minX = 1e9, minY = 1e9, maxX = -1e9, maxY = -1e9;
  for (const ds of LATAM_DATASET) {
    const ne = PAIS_DS_TO_NE[ds];
    const country = WGEO.countries[ne];
    if (!country) continue;
    paths.push({ ds, ne, d: country.d });
    const pts = country.d.match(/-?\d+\.?\d*/g);
    if (pts) {
      for (let i = 0; i < pts.length; i += 2) {
        const x = +pts[i], y = +pts[i+1];
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }
  // Set viewBox com padding
  if (minX !== 1e9) {
    const pad = 6;
    const vb = `${(minX-pad).toFixed(1)} ${(minY-pad).toFixed(1)} ${(maxX-minX+pad*2).toFixed(1)} ${(maxY-minY+pad*2).toFixed(1)}`;
    document.getElementById('latam_map').setAttribute('viewBox', vb);
  }
  // Insere paths
  for (const p of paths) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    el.setAttribute('class', 'pais');
    el.setAttribute('d', p.d);
    el.setAttribute('data-pais', p.ds);
    el.setAttribute('fill-rule', 'evenodd');
    el.addEventListener('click', () => {
      state.selectedPais = state.selectedPais === p.ds ? null : p.ds;
      state.pais = state.selectedPais || '';
      document.getElementById('f_pais').value = state.pais;
      renderAll();
    });
    layer.appendChild(el);
  }
}

function renderMap(agg) {
  const layer = document.getElementById('latam_paths');
  if (!layer) return;
  let max = 0;
  for (const ds in agg.porPais) {
    if (agg.porPais[ds].val > max) max = agg.porPais[ds].val;
  }
  layer.querySelectorAll('.pais').forEach(p => {
    const ds = p.dataset.pais;
    const info = agg.porPais[ds];
    const v = info ? info.val : 0;
    const t = max ? v / max : 0;
    if (v > 0) {
      p.setAttribute('fill', heatRGB(t));
      p.classList.remove('empty');
    } else {
      p.setAttribute('fill', '#1a1a1a');
      p.classList.add('empty');
    }
    p.classList.toggle('selected', state.selectedPais === ds);
    // Tooltip via title
    let title = p.querySelector('title');
    if (!title) {
      title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
      p.appendChild(title);
    }
    title.textContent = ds + (info ? ' — ' + fmtMoney(info.val) + ' · ' + info.cnt + ' pedidos' : ' — sem vendas no recorte');
  });
  document.getElementById('legend_max').textContent = fmtMoneyShort(max);
  document.getElementById('map_info').textContent =
    Object.keys(agg.porPais).length + ' país(es) · top: ' +
    (Object.entries(agg.porPais).sort((a,b)=>b[1].val-a[1].val)[0]?.[0] || '—');
}

// === Render Tabela Países ===
let _paisesSort = { k: 'val', dir: -1 };
function renderTabPaises(agg) {
  const arr = Object.entries(agg.porPais).map(([pais, d]) => ({
    pais, cnt: d.cnt, val: d.val,
    pct: agg.totVal > 0 ? (d.val / agg.totVal * 100) : 0
  }));
  const k = _paisesSort.k, dir = _paisesSort.dir;
  arr.sort((a,b) => {
    let av = a[k], bv = b[k];
    if (typeof av === 'string') return dir * av.localeCompare(bv);
    return dir * (av - bv);
  });
  const max = Math.max.apply(null, arr.map(x => x.val).concat([1]));
  const tbody = document.querySelector('#tb_paises tbody');
  if (!arr.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="padding:20px;text-align:center;color:var(--muted)">Sem vendas LATAM no recorte.</td></tr>';
  } else {
    tbody.innerHTML = arr.map(x => {
      const w = Math.max(2, Math.round(x.val / max * 60));
      return `<tr data-pais="${x.pais}">
        <td><span class="country-bar" style="width:${w}px"></span>${x.pais}</td>
        <td class="num">${fmtInt(x.cnt)}</td>
        <td class="num">${fmtMoneyShort(x.val)}</td>
        <td class="num">${x.pct.toFixed(1).replace('.',',')}%</td>
      </tr>`;
    }).join('');
    tbody.querySelectorAll('tr').forEach(tr => {
      tr.onclick = () => {
        state.selectedPais = state.selectedPais === tr.dataset.pais ? null : tr.dataset.pais;
        state.pais = state.selectedPais || '';
        document.getElementById('f_pais').value = state.pais;
        renderAll();
      };
    });
  }
  document.getElementById('paises_info').textContent = arr.length + ' país(es)';
}

// === Charts ===
let charts = {};
function renderTimeline(agg) {
  const entries = Object.entries(agg.porMes).sort((a,b)=>+a[0] - +b[0]);
  const labels = entries.map(([ym]) => {
    const y = Math.floor(+ym / 100), m = +ym % 100;
    const MS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return MS[m-1] + '/' + (y % 100);
  });
  const data = entries.map(([,v]) => v.val);
  const cfg = {
    type: 'line',
    data: { labels, datasets: [{
      data, borderColor: '#DC2626',
      backgroundColor: 'rgba(220,38,38,.15)',
      tension: 0.3, fill: true, borderWidth: 2,
      pointRadius: 3, pointBackgroundColor: '#DC2626'
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => fmtMoney(c.parsed.y) } }
      },
      scales: {
        x: { grid: { color: '#222' }, ticks: { color: '#aaa', font: { size: 9 } } },
        y: {
          grid: { color: '#222' },
          ticks: { color: '#aaa', font: { size: 9 }, callback: v => fmtMoneyShort(v) }
        }
      }
    }
  };
  if (charts.timeline) { charts.timeline.destroy(); }
  charts.timeline = new Chart(document.getElementById('chart_timeline'), cfg);
}

function renderProdutos(agg) {
  const top = Object.entries(agg.porProduto)
    .sort((a,b) => b[1].val - a[1].val).slice(0, 10);
  const labels = top.map(([n]) => n.length > 28 ? n.substring(0,26)+'…' : n);
  const data = top.map(([,v]) => v.val);
  const qtds = top.map(([,v]) => Math.round(v.qtd));
  const cfg = {
    type: 'bar',
    data: { labels, datasets: [{ data, backgroundColor: '#DC2626', borderRadius: 3 }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => fmtMoney(c.parsed.x) + ' · ' + fmtInt(qtds[c.dataIndex]) + ' un.' } }
      },
      scales: {
        x: { ticks: { callback: v => fmtMoneyShort(v), color: '#aaa', font: { size: 9 } }, grid: { color: '#222' } },
        y: { ticks: { color: '#aaa', font: { size: 9 } }, grid: { display: false } }
      }
    }
  };
  if (charts.produtos) { charts.produtos.destroy(); }
  charts.produtos = new Chart(document.getElementById('chart_produtos'), cfg);
}

function renderClientes(agg) {
  const arr = Object.entries(agg.porCliente)
    .map(([cli, d]) => {
      const c = DATA.clients[cli] || ['','',''];
      return {
        cd: c[0] || '', nome: c[1] || '—',
        val: d.val, cnt: d.cnt,
        paises: [...d.paises].join(', ')
      };
    })
    .sort((a, b) => b.val - a.val).slice(0, 20);
  const tbody = document.querySelector('#tb_clientes tbody');
  if (!arr.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--muted)">—</td></tr>';
  } else {
    tbody.innerHTML = arr.map((x, i) =>
      `<tr><td>${i+1}</td><td><strong>${x.nome}</strong> <span style="color:var(--muted);font-size:10px">${x.cd}</span></td>
       <td>${x.paises}</td><td class="num">${fmtInt(x.cnt)}</td><td class="num">${fmtMoneyShort(x.val)}</td></tr>`
    ).join('');
  }
  document.getElementById('clientes_info').textContent = arr.length + ' clientes';
}

// === Render All ===
function renderAll() {
  const agg = aggregate();
  renderKPIs(agg);
  renderMap(agg);
  renderTabPaises(agg);
  renderTimeline(agg);
  renderProdutos(agg);
  renderClientes(agg);
}

// === Init ===
function init() {
  // Esconde loading
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = '';

  // Popula filtros
  const anos = new Set();
  for (const r of DATA.orders) {
    if (DATA.ufs[r[C.uf]] !== 'EX') continue;
    anos.add(r[C.ano]);
  }
  const anoSel = document.getElementById('f_ano');
  [...anos].sort().forEach(a => {
    const opt = document.createElement('option');
    opt.value = a; opt.textContent = a;
    anoSel.appendChild(opt);
  });
  const paisSel = document.getElementById('f_pais');
  [...LATAM_DATASET].sort().forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    paisSel.appendChild(opt);
  });

  // Handlers
  anoSel.onchange = e => { state.ano = e.target.value; renderAll(); };
  paisSel.onchange = e => {
    state.pais = e.target.value;
    state.selectedPais = state.pais || null;
    renderAll();
  };
  document.getElementById('btn_reset').onclick = () => {
    state.ano = ''; state.pais = ''; state.selectedPais = null;
    anoSel.value = ''; paisSel.value = '';
    renderAll();
  };

  // Sort tabela países
  document.querySelectorAll('#tb_paises th').forEach(th => {
    th.onclick = () => {
      const k = th.dataset.k;
      if (_paisesSort.k === k) _paisesSort.dir *= -1;
      else { _paisesSort.k = k; _paisesSort.dir = (k === 'pais') ? 1 : -1; }
      renderAll();
    };
  });

  // Constrói mapa (uma vez) + render
  buildMap();
  renderAll();
}

// Boot quando tudo carregar
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  setTimeout(init, 30);
}
</script>
